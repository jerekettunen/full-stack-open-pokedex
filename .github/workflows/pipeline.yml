name: Simple Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

env:
  CONDITION: ${{contains(join(github.event.commits.*.message, ' '), '#skip')}}

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx playwright install --with-deps

      - name: Check style
        run: npm run eslint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Trigger deployment
        id: deploy
        if: ${{ github.event_name == 'push' && env.CONDITION == 'false' }}
        run: curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

      - name: Notify success
        uses: tsickert/discord-webhook@v7.0.0
        if: ${{success() && github.event_name == 'push' && env.CONDITION == 'false'}}
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          content: 'Successfully deployed to Render }}'
      - name: Test Failure
        uses: tsickert/discord-webhook@v7.0.0
        if: ${{failure() && steps.deploy.conclusion == 'failure'}}
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          content: 'This whole thing failed us: ${{ github.event.head_commit.url }}'

  tag_release:
    needs: [simple_deployment_pipeline]
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version and push tag
        if: ${{ github.event_name == 'push' && env.CONDITION == 'false' }}
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
